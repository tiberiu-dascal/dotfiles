[mgr]
ratio       = [ 1, 3, 4 ]
show_hidden = true
linemod     = "size"

[preview]
cache_dir = "~/.cache/yazi"
wrap = "yes"
max_width = 1920
max_height = 1080
tab_size = 2
image_filter = "tringle"
image_quality = 75
ueberzug_scale = 1
ueberzug_offset = [ 0, 0, 0, 0 ]
windows_padding_x = 0

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*/"
run   = "git"
group = "git" 
