#command_timeout = 1000

format = """
[оВґ](#a3aed2)\
[ рЯРІ ](bg:#a3aed2 fg:#090c0c)\
[оВі](fg:#a3aed2 bg:#769ff0)\
$directory\
$hostname\
[оВі](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оВі](fg:#394260 bg:#212736)\
$nodejs\
$rust\
$golang\
$python\
$php\
[оВі](fg:#212736 bg:#1d2230)\
